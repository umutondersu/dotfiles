# vim:fileencoding=utf-8:ft=conf:foldmethod=marker

# Kitty Configuration (Converted from Alacritty)

# Font settings
font_family JetBrainsMono Nerd Font
font_size 14.0

# Padding
window_padding_width 3 1 1 2

# Scrollback buffer
scrollback_lines 10000

# Shell (launch fish with tmux session if available)
env PATH=${HOME}/.local/share/devbox/global/default/.devbox/nix/profile/default/bin:${HOME}/.local/bin:${PATH}
shell /usr/bin/env fish -c "if command -q tmux; tmux a; or tmux new-session -s default; else; exec fish; end"

# Prevent clipboard appending new text instead of replacing
# https://github.com/kovidgoyal/kitty/issues/1951
clipboard_control write-clipboard write-primary no-append

# Disable ligatures
disable_ligatures always

# Do not ask for confirmation when quitting and pasting
confirm_os_window_close 0
paste_actions no-op

# Rendering
repaint_delay 8
input_delay 1
sync_to_monitor yes

# Platform-specific settings (KITTY_OS is 'macos' or 'linux' or 'bsd')
include ${KITTY_OS}.conf

# Tokyo Night theme
include ~/.config/kitty/tokyo-night.conf
