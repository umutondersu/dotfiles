# macOS-specific settings

# Match Linux/FreeType rendering (gamma 1.0, contrast 0 — same as Linux defaults)
# macOS defaults are 1.7 gamma and 30 contrast, which make fonts thicker/darker
text_composition_strategy 1.0 0

# Keyboard
macos_option_as_alt yes
font_size 20.0
map cmd+space send_text all \x00
map opt+cmd+s no_op
